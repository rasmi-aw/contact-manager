<div class="form-container">
  <mat-card class="form-card">
    <mat-card-title>{{ isEditMode ? 'Edit' : 'Create' }} Contact</mat-card-title>
    <mat-card-content>
      <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="fill">
          <mat-label>First Name</mat-label>
          <input matInput formControlName="firstname">
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label>Last Name</mat-label>
          <input matInput formControlName="lastname">
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email">
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label>Phone</mat-label>
          <input matInput formControlName="phone">
        </mat-form-field>

        <div class="form-actions">
          <button mat-button type="button" routerLink="/contacts">Cancel</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="contactForm.invalid">Save</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
