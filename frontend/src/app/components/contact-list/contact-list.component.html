<div class="container">
  <div class="toolbar">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search Contacts</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Ex. John Doe">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>

    <div class="actions-wrapper">
      <button mat-raised-button color="primary" routerLink="/contacts/new">
        <mat-icon>add</mat-icon> Add Contact
      </button>
      <button mat-stroked-button color="accent" (click)="exportToCsv()">
        <mat-icon>download</mat-icon> Export CSV
      </button>
      <button mat-stroked-button color="primary" (click)="fileInput.click()">
        <mat-icon>upload</mat-icon> Import CSV
      </button>
      <input #fileInput type="file" (change)="onFileSelected($event)" accept=".csv" style="display: none" />
    </div>
  </div>

  @if (store.loading()) {
    <div style="text-align: center; padding: 20px;">Loading data...</div>
  }

  <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">
    <ng-container matColumnDef="firstname">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> First Name </th>
      <td mat-cell *matCellDef="let element"> {{element.firstname}} </td>
    </ng-container>

    <ng-container matColumnDef="lastname">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Last Name </th>
      <td mat-cell *matCellDef="let element"> {{element.lastname}} </td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Email </th>
      <td mat-cell *matCellDef="let element"> {{element.email}} </td>
    </ng-container>

    <ng-container matColumnDef="phone">
      <th mat-header-cell *matHeaderCellDef> Phone </th>
      <td mat-cell *matCellDef="let element"> {{element.phone}} </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Actions </th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button color="primary" [routerLink]="['/contacts', element.id]">
          <mat-icon>visibility</mat-icon>
        </button>
        <button mat-icon-button color="accent" [routerLink]="['/contacts/edit', element.id]">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="onDelete(element.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
